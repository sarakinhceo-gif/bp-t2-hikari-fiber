<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="896" cy="705" r="42" fill="#334155" opacity="0.11"/>
    <circle cx="120" cy="100" r="67" fill="#334155" opacity="0.06"/>
    <circle cx="114" cy="262" r="33" fill="#334155" opacity="0.16"/>
    <circle cx="211" cy="660" r="43" fill="#334155" opacity="0.08"/>
    <circle cx="782" cy="25" r="47" fill="#334155" opacity="0.08"/>
    <circle cx="1115" cy="46" r="58" fill="#334155" opacity="0.13"/>
    <rect x="996" y="491" width="32" height="48" rx="8" fill="#0f172a" opacity="0.08" transform="rotate(10, 918, -28)"/>
    <rect x="46" y="527" width="56" height="87" rx="8" fill="#0f172a" opacity="0.04" transform="rotate(39, 372, 293)"/>
    <rect x="1244" y="714" width="85" height="61" rx="8" fill="#0f172a" opacity="0.15" transform="rotate(22, 53, 651)"/>
    <rect x="216" y="-89" width="22" height="34" rx="8" fill="#0f172a" opacity="0.10" transform="rotate(9, 1232, 394)"/>
    <rect x="-75" y="307" width="32" height="94" rx="8" fill="#0f172a" opacity="0.06" transform="rotate(44, 824, 91)"/>
    <rect x="618" y="-77" width="86" height="43" rx="8" fill="#0f172a" opacity="0.13" transform="rotate(14, 136, 690)"/>
    <rect x="530" y="408" width="74" height="46" rx="8" fill="#0f172a" opacity="0.09" transform="rotate(39, 935, 448)"/>
    <rect x="819" y="709" width="58" height="46" rx="8" fill="#0f172a" opacity="0.10" transform="rotate(2, 688, -9)"/>
    <polygon points="185,565 207,609 163,609" fill="#334155" opacity="0.04"/>
    <polygon points="773,190 826,296 720,296" fill="#334155" opacity="0.12"/>
    <polygon points="14,-94 67,12 -39,12" fill="#334155" opacity="0.04"/>
    <polygon points="909,663 960,765 858,765" fill="#334155" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,532 C360,581 840,483 1200,532 L1200,630 L0,630Z" fill="#334155" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 인덱싱 속도 초고속 광회선 대역폭 최적화
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 크롤 가속화
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#6366f1" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     구글 인덱싱 속도 초고속 광회선 대역폭 최적화 — 크롤 가속화
  </text>
</svg>